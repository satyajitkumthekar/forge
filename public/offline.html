<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FAF9F6">
    <title>Offline - Superhuman Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #FAF9F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 8px rgba(31, 28, 24, 0.08), 0 20px 48px -12px rgba(31, 28, 24, 0.22);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1F1C18;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: #57524A;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .retry-button {
            background: #1F1C18;
            color: #FAF9F6;
            border: none;
            min-height: 44px;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.15s;
        }

        .retry-button:hover {
            background: #57524A;
        }

        .retry-button:active {
            transform: scale(0.97);
        }

        .status {
            margin-top: 24px;
            font-size: 14px;
            color: #8A8378;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>Superhuman Lab needs an internet connection to function. Check your connection and try again.</p>
        <button class="retry-button" onclick="window.location.reload()">
            Try Again
        </button>
        <div class="status" id="status"></div>
    </div>

    <script>
        // Check if we're back online
        function checkOnlineStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.textContent = '✓ Connection restored!';
                status.style.color = '#10A37F';
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                status.textContent = 'Still offline...';
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', () => {
            checkOnlineStatus();
        });

        window.addEventListener('offline', () => {
            const status = document.getElementById('status');
            status.textContent = 'Connection lost';
            status.style.color = '#DC2626';
        });

        // Initial check
        checkOnlineStatus();
    </script>
</body>
</html>
